databaseChangeLog:
  - changeSet:
      id: 0003-01-prices
      author: maya
      changes:
        - createTable:
            tableName: prices
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: amount
                  type: decimal(10,2)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: varchar(3)
                  defaultValue: "EUR"

  - changeSet:
      id: 0003-02-enrollments
      author: maya
      changes:
        - createTable:
            tableName: enrollments
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: student_id
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: course_id
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: enrolled_at
                  type: datetime2
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: enrollments
            baseColumnNames: student_id
            referencedTableName: students
            referencedColumnNames: id
            constraintName: fk_enroll_student
        - addForeignKeyConstraint:
            baseTableName: enrollments
            baseColumnNames: course_id
            referencedTableName: courses
            referencedColumnNames: id
            constraintName: fk_enroll_course