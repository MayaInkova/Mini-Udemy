databaseChangeLog:
  - changeSet:
      id: 0001-01-teachers
      author: maya
      changes:
        - createTable:
            tableName: teachers
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: full_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: bio
                  type: nvarchar(max)
              - column:
                  name: created_at
                  type: datetime2
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 0001-02-students
      author: maya
      changes:
        - createTable:
            tableName: students
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: email
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: datetime2
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 0001-03-courses
      author: maya
      changes:
        - createTable:
            tableName: courses
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: teacher_id
                  type: int
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: datetime2
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: courses
            baseColumnNames: teacher_id
            referencedTableName: teachers
            referencedColumnNames: id
            constraintName: fk_courses_teacher