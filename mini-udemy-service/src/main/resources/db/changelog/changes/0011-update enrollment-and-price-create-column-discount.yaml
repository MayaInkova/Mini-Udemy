databaseChangeLog:
  - changeSet:
      id: 0011-update-enrollment-and-price-create-column-discount
      author: maya
      changes:
        - addColumn:
              tableName: prices
              columns:
                - column:
                    name: discount
                    type: double
        - dropColumn:
            tableName: enrollments
            columnName: enrolled_at
        - addColumn:
            tableName: enrollments
            columns:
              - column:
                  name: created_at
                  type: datetime2