  openapi: 3.0.3
  info:
    title: Mini Udemy API
    version: 1.0.0
    description: Mini Udemy - Design First contract

  servers:
    - url: http://localhost:8080
      description: Local Server

  tags:
    - name: Courses
    - name: Teachers

  paths:

    /api/system/health:
      get:
        summary: Healthcheck
        description: Returns 200 OK for healthcheck purposes.
        tags:
          - "System"
        security: [ ]
        responses:
          "200":
            description: "OK"
            content:
              application/json:
                schema:
                  type: string

    /api/system/info:
      get:
        summary: Application version
        description: Returns current application version/build metadata.
        tags:
          - "System"
        security: [ ]
        responses:
          "200":
            $ref: "#/components/responses/SystemInfoResponse"

    /api/courses:
      get:
        tags:
          - Courses
        summary: List with very courses
        operationId: getAllCourses
        responses:
          "200":
            description: Successful
            content:
              application/json:
                schema:
                    $ref: "#/components/schemas/CourseListResponse"
          "400":
            $ref: "#/components/responses/BadRequest"
          "401":
            $ref: "#/components/responses/Unauthorized"
          "403":
            $ref: "#/components/responses/Forbidden"
          "500":
            $ref: "#/components/responses/InternalServerError"

      post:
        tags:
          - "Courses"
        summary: Create new course
        operationId: createCourse
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseCreateRequest"
        responses:
          "201":
            description: Course is create
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/CourseResponse"
          "400":
            $ref: "#/components/responses/BadRequest"
          "401":
            $ref: "#/components/responses/Unauthorized"
          "403":
            $ref: "#/components/responses/Forbidden"
          "500":
            $ref: "#/components/responses/InternalServerError"

    /api/courses/{id}:
      get:
        tags:
          - "Courses"
        operationId: getCourseId
        parameters:
          - $ref: "#/components/parameters/CourseId"
        responses:
          "200":
            description: "OK"
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/CourseResponse"
          "400":
            $ref: "#/components/responses/BadRequest"
          "401":
            $ref: "#/components/responses/Unauthorized"
          "403":
            $ref: "#/components/responses/Forbidden"
          "404":
            $ref: "#/components/responses/NotFound"
          "500":
            $ref: "#/components/responses/InternalServerError"

      put:
        summary: Update course
        description: Updates an existing course by id.
        tags:
          - "Courses"
        operationId: updateCourse
        parameters:
          - $ref: "#/components/parameters/CourseId"
        requestBody:
          description: Course update request.
          required: true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseUpdateRequest"
        responses:
          "200":
            description: "OK"
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/CourseResponse"
          "400":
            $ref: "#/components/responses/BadRequest"
          "401":
            $ref: "#/components/responses/Unauthorized"
          "403":
            $ref: "#/components/responses/Forbidden"
          "404":
            $ref: "#/components/responses/NotFound"
          "500":
            $ref: "#/components/responses/InternalServerError"

      delete:
        summary: Delete course
        description: Deletes a course by id.
        tags:
          - "Courses"
        operationId: deleteCourse
        parameters:
          - $ref: "#/components/parameters/CourseId"
        responses:
          "204":
            description: "No Content"
          "400":
            $ref: "#/components/responses/BadRequest"
          "401":
            $ref: "#/components/responses/Unauthorized"
          "403":
            $ref: "#/components/responses/Forbidden"
          "404":
            $ref: "#/components/responses/NotFound"
          "500":
            $ref: "#/components/responses/InternalServerError"

    /api/teacher:
      get:
        tags:
          - Teachers
        summary: List with very teacher
        operationId: getAllTeacher
        responses:
          "200":
            description: Successful
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/TeacherListResponse"
          "400":
            $ref: "#/components/responses/BadRequest"
          "401":
            $ref: "#/components/responses/Unauthorized"
          "403":
            $ref: "#/components/responses/Forbidden"
          "500":
            $ref: "#/components/responses/InternalServerError"

      post:
        tags:
          - "Teachers"
        summary: Create new teacher
        operationId: createTeacher
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherCreateRequest"
        responses:
          "201":
            description: Course is create
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/TeacherResponse"
          "400":
            $ref: "#/components/responses/BadRequest"
          "401":
            $ref: "#/components/responses/Unauthorized"
          "403":
            $ref: "#/components/responses/Forbidden"
          "500":
            $ref: "#/components/responses/InternalServerError"

    /api/teacher/{id}:
      get:
        tags:
          - "Teachers"
        operationId: getTeacherId
        parameters:
          - $ref: "#/components/parameters/TeacherId"
        responses:
          "200":
            description: "OK"
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/TeacherResponse"
          "400":
            $ref: "#/components/responses/BadRequest"
          "401":
            $ref: "#/components/responses/Unauthorized"
          "403":
            $ref: "#/components/responses/Forbidden"
          "404":
            $ref: "#/components/responses/NotFound"
          "500":
            $ref: "#/components/responses/InternalServerError"

      put:
        summary: Update teacher
        description: Updates an existing teacher by id.
        tags:
          - "Teachers"
        operationId: updateTeacher
        parameters:
          - $ref: "#/components/parameters/TeacherId"
        requestBody:
          description: Teacher update request.
          required: true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeacherUpdateRequest"
        responses:
          "200":
            description: "OK"
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/TeacherResponse"
          "400":
            $ref: "#/components/responses/BadRequest"
          "401":
            $ref: "#/components/responses/Unauthorized"
          "403":
            $ref: "#/components/responses/Forbidden"
          "404":
            $ref: "#/components/responses/NotFound"
          "500":
            $ref: "#/components/responses/InternalServerError"

      delete:
        summary: Delete teacher
        description: Deletes a teacher by id.
        tags:
          - "Courses"
        operationId: deleteTeacher
        parameters:
          - $ref: "#/components/parameters/TeacherId"
        responses:
          "204":
            description: "No Content"
          "400":
            $ref: "#/components/responses/BadRequest"
          "401":
            $ref: "#/components/responses/Unauthorized"
          "403":
            $ref: "#/components/responses/Forbidden"
          "404":
            $ref: "#/components/responses/NotFound"
          "500":
            $ref: "#/components/responses/InternalServerError"

  components:
    parameters:
      CourseId:
        name: id
        in: path
        required: true
        description: "UrL Course ID"
        schema:
          type: integer
          format: int64

      TeacherId:
        name: id
        in: path
        required: true
        description: "UrL TeacherId ID"
        schema:
          type: integer
          format: int64

    schemas:
      Teacher:
        type: object
        properties:
          id:
            type: integer
            format: int64
          fullName:
            type: string
          email:
            type: string
          bio:
            type: string

      Price:
        type: object
        properties:
          id:
            type: integer
            format: int64
          amount:
            type: number
            format: double
          currency:
            type: string

      Course:
        type: object
        properties:
          id:
            type: integer
            format: int64
          title:
            type: string
          description:
            type: string
          price:
            $ref: '#/components/schemas/Price'
          teacher:
            $ref: '#/components/schemas/Teacher'

      Enrollment:
        type: object
        properties:
          id:
            type: integer
            format: int64
          student:
            $ref: '#/components/schemas/Student'
          course:
            $ref: '#/components/schemas/Course'
          enrolledAt:
            type: string
            format: date-time

      CourseCreateRequest:
        type: object
        required:
          - title
          - teacherId
        properties:
          title:
            type: string
            minLength: 1
            maxLength: 255
          description:
            type: string
          priceAmount:
            type: number
          teacherId:
            type: integer
            format: int64

      CourseResponse:
        type: object
        properties:
          data:
            $ref: '#/components/schemas/Course'

      CourseListResponse:
        type: object
        required: [data]
        properties:
          data:
            type: array
            items:
              $ref: "#/components/schemas/Course"

      Student:
        type: object
        properties:
          id:
            type: integer
            format: int64
          username:
            type: string
          email:
            type: string
          createdAt:
            type: string
            format: date-time

      CourseUpdateRequest:
        type: object
        required:
          - title
        properties:
          title:
            type: string
            minLength: 1
            maxLength: 255
          description:
            type: string
          priceAmount:
            type: number
            minimum: 0
          teacherId:
            type: integer
            format: int64
            description: "ID of the teacher if you want to change it"

      TeacherCreateRequest:
        type: object
        required:
          - fullName
        properties:
          fullName:
            type: string
            minLength: 1
            maxLength: 255
          email:
            type: string
          bio:
            type: string

      TeacherResponse:
        type: object
        properties:
          data:
            $ref: '#/components/schemas/Teacher'

      TeacherListResponse:
        type: object
        required: [ data ]
        properties:
          data:
            type: array
            items:
              $ref: "#/components/schemas/Teacher"


      TeacherUpdateRequest:
        type: object
        required:
          - fullName
        properties:
          fullName:
            type: string
            minLength: 1
            maxLength: 255
          email:
            type: string
          bio:
            type: string

    responses:
      BadRequest:
        description: Bad Request
      Unauthorized:
        description: Unauthorized
      Forbidden:
        description: Forbidden
      InternalServerError:
        description: Internal Server Error
      SystemInfoResponse:
        description: System Info
      NotFound:
        description: Not Found


