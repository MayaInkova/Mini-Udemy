  openapi: 3.0.3
  info:
    title: Mini Udemy API
    version: 1.0.0
    description: Mini Udemy - Design First contract

  servers:
    - url: http://localhost:8080
      description: Local Server

  tags:
    - name: Courses

  paths:

    /api/system/health:
      get:
        summary: Healthcheck
        description: Returns 200 OK for healthcheck purposes.
        tags:
          - "System"
        security: [ ]
        responses:
          "200":
            description: "OK"
            content:
              application/json:
                schema:
                  type: string

    /api/system/info:
      get:
        summary: Application version
        description: Returns current application version/build metadata.
        tags:
          - "System"
        security: [ ]
        responses:
          "200":
            $ref: "#/components/responses/SystemInfoResponse"

    /api/courses:
      get:
        tags:
          - Courses
        summary: List with very courses
        operationId: getCourses
        responses:
          "200":
            description: Successful
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: "#/components/schemas/Course"
          "400":
            $ref: "#/components/responses/BadRequest"
          "401":
            $ref: "#/components/responses/Unauthorized"
          "403":
            $ref: "#/components/responses/Forbidden"
          "500":
            $ref: "#/components/responses/InternalServerError"

      post:
        tags:
          - "Courses"
        summary: Create new course
        operationId: createCourse
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseCreateRequest"
        responses:
          "201":
            description: Course is create
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/CourseResponse"
          "400":
            $ref: "#/components/responses/BadRequest"
          "401":
            $ref: "#/components/responses/Unauthorized"
          "403":
            $ref: "#/components/responses/Forbidden"
          "500":
            $ref: "#/components/responses/InternalServerError"


  components:
    parameters:
      CourseId:
        name: id
        in: path
        required: true
        description: "UrL Course ID"
        schema:
          type: integer
          format: int64

      TeacherId:
        name: id
        in: path
        required: true
        description: "UrL Teacher ID"
        schema:
          type: integer
          format: int64

    schemas:
      Teacher:
        type: object
        properties:
          id:
            type: integer
            format: int64
          fullName:
            type: string
          email:
            type: string
          bio:
            type: string

      Price:
        type: object
        properties:
          id:
            type: integer
            format: int64
          amount:
            type: number
            format: double
          currency:
            type: string

      Course:
        type: object
        properties:
          id:
            type: integer
            format: int64
          title:
            type: string
          description:
            type: string
          price:
            $ref: '#/components/schemas/Price'
          teacher:
            $ref: '#/components/schemas/Teacher'

      Enrollment:
        type: object
        properties:
          id:
            type: integer
            format: int64
          student:
            $ref: '#/components/schemas/Student'
          course:
            $ref: '#/components/schemas/Course'
          enrolledAt:
            type: string
            format: date-time

      CourseCreateRequest:
        type: object
        required:
          - title
          - teacherId
        properties:
          title:
            type: string
          description:
            type: string
          priceAmount:
            type: number
          teacherId:
            type: integer
            format: int64

      CourseResponse:
        type: object
        properties:
          data:
            $ref: '#/components/schemas/Course'

      Student:
        type: object
        properties:
          id:
            type: integer
            format: int64
          username:
            type: string
          email:
            type: string
          createdAt:
            type: string
            format: date-time

    responses:
      BadRequest:
        description: Bad Request
      Unauthorized:
        description: Unauthorized
      Forbidden:
        description: Forbidden
      InternalServerError:
        description: Internal Server Error
      SystemInfoResponse:
        description: System Info


